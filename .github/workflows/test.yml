name: Test

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
            tf-package: "tensorflow==2.15.1"
            numpy-package: "numpy==1.26.4"
          - os: ubuntu-latest
            python-version: "3.11"
            tf-package: "tensorflow==2.15.1"
            numpy-package: "numpy==1.26.4"
          - os: macOS-latest
            python-version: "3.11"
            tf-package: "tensorflow==2.15.1"
            numpy-package: "numpy==1.26.4"
          - os: ubuntu-latest
            python-version: "3.14"
            tf-package: "tf-nightly"
            numpy-package: ""
          - os: macOS-latest
            python-version: "3.14"
            tf-package: "tf-nightly"
            numpy-package: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install poetry
        shell: bash
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Set poetry path variable
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure poetry
        shell: bash
        run: poetry config virtualenvs.in-project true

      - name: Check for healthy virtualenv manually
        shell: bash
        run: |
          if [ -d .venv ]; then
            poetry run pip --version >/dev/null 2>&1 || rm -rf .venv
          fi

      - name: Install dependencies
        shell: bash
        run: |
          poetry run python -m pip install --upgrade pip
          poetry install --no-interaction --no-root
          poetry run python -m pip install "${{ matrix.tf-package }}" matplotlib
          if [ -n "${{ matrix.numpy-package }}" ]; then
            poetry run python -m pip install "${{ matrix.numpy-package }}"
          fi

      - name: Run pytest
        shell: bash
        run: poetry run coverage run -m pytest -q

      - name: Statistics
        if: success()
        run: |
          poetry run coverage report -i
          poetry run coverage xml -i

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: cpu, unittest
          name: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false

  docs:
    name: Test docs build
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create pip cache directory manually
        run: |
          CACHE_DIR="$HOME/.cache/pip"
          mkdir -p "$CACHE_DIR"
          echo "Using manual pip cache at $CACHE_DIR"

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          python -m pip install --upgrade pip
          pip install -r docs/requirements_docs.txt
        shell: bash

      - name: Build sphinx documentation
        run: |
          cd docs
          make clean
          make html --debug --jobs 2 SPHINXOPTS=""

      - name: Upload built docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-results-${{ runner.os }}-py311
          path: docs/build/html/
        if: success()
